apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-devops-api
  namespace: lab-devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-devops-api
  template:
    metadata:
      labels:
        app: lab-devops-api
    spec:
      nodeSelector:
        role: backend
      containers:
        - name: api
          image: leonardojr96/backend_to_do_list:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
