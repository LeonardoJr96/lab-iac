apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: registro-atividades-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/leonardojr96/registro-atividades-k8s.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: registro-atividades
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
