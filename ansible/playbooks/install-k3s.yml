---
- name: Instalar k3s no control plane
  hosts: control_plane
  become: true
  tasks:
    - name: Instalar k3s
      shell: curl -sfL https://get.k3s.io | sh
      args:
        creates: /usr/local/bin/k3s

    - name: Aguardar arquivo de token
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 60

    - name: Obter token do cluster
      command: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token
      changed_when: false

- name: Instalar k3s nos workers
  hosts: workers_cluster
  become: true
  vars:
    master_private_ip: "{{ hostvars[groups['control_plane'][0]]['private_ip'] }}"
    master_token: "{{ hostvars[groups['control_plane'][0]]['k3s_token']['stdout'] | trim }}"
  tasks:
    - name: Instalar k3s agent
      shell: |
        curl -sfL https://get.k3s.io | \
          K3S_URL=https://{{ master_private_ip }}:6443 \
          K3S_TOKEN={{ master_token }} sh -
      args:
        creates: /usr/local/bin/k3s

- name: Validar cluster
  hosts: control_plane
  become: true
  tasks:
    - name: Aguardar nos ficarem Ready
      shell: kubectl wait --for=condition=Ready nodes --all --timeout=120s
      changed_when: false

- name: Aplicar labels nos workers
  hosts: control_plane
  become: true
  tasks:
    - name: Label nodes frontend
      command: kubectl label node {{ item }} role=frontend --overwrite
      loop: "{{ groups['frontend_workers'] }}"
      changed_when: true

    - name: Label nodes backend
      command: kubectl label node {{ item }} role=backend --overwrite
      loop: "{{ groups['backend_workers'] }}"
      changed_when: true

    - name: Label nodes control Plane
      command: kubectl label node {{ item }} role=control-plane --overwrite
      loop: "{{ groups['control_plane'] }}"
      changed_when: true
